services:
  advad-backend:
    build: .
    ports:
      - "10000:10000"
    env_file:
      - .env
    environment:
      - PORT=10000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_TOKEN=${APP_TOKEN}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
    volumes:
      - leaderboard_data:/app/data
    command:
      - gunicorn
      - app:app
      - -w
      - "2"
      - -k
      - uvicorn.workers.UvicornWorker
      - -b
      - 0.0.0.0:10000
      - --timeout
      - "120"
    restart: unless-stopped

volumes:
  leaderboard_data:
    driver: local
